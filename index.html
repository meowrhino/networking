<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14130f">
  <title>el pequeño networker</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">☁️</text></svg>'>

  <!-- pwa: instalable y offline -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="networker">
  <link rel="apple-touch-icon" href="icon-180.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topquiet">
    <button class="ev" id="evBtn" data-action="openmodal" aria-haspopup="dialog">sónar+d 2026</button>
  </div>

  <!-- las 4 secciones se cruzan con fundido (carrete) -->
  <div class="viewport" id="viewport">
    <section class="page active" data-page="0"><div id="convo"></div></section>
    <section class="page" data-page="1"><div id="contactos"></div></section>
    <section class="page" data-page="2"><div id="frases"></div></section>
    <section class="page" data-page="3"><div id="tarjetas"></div></section>
  </div>

  <!-- menú arrastrable (estilo pol roig): el activo en el centro, arrastras al que quieras -->
  <nav class="navbar">
    <div class="navrail" id="navrail"></div>
    <div class="navrail-mask"></div>
  </nav>

  <div class="turnins" id="turnins" aria-live="polite"></div>

  <!-- modal: misión + sonido (se abre al tocar el título) -->
  <div class="modal" id="modal" hidden>
    <div class="modal-bg" data-action="closemodal"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="sónar+d 2026">
      <button class="modal-x" data-action="closemodal" aria-label="cerrar">cerrar</button>
      <div class="mission" id="mission"></div>
      <div class="modal-sound">
        <button data-action="mute" id="mute" aria-label="sonido">sonido on</button>
      </div>
    </div>
  </div>

  <script src="events/sonar.js"></script>
  <script src="app.js"></script>
</body>
</html>
