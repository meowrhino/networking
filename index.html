<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14130f">
  <title>el pequeño networker</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">☁️</text></svg>'>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topquiet">
    <span class="ev" id="ev">sónar+d 2026</span>
    <span class="ctrls">
      <button data-action="textdown" aria-label="texto más pequeño">a−</button>
      <button data-action="textup" aria-label="texto más grande">a+</button>
      <button data-action="mute" id="mute" aria-label="silenciar">son.</button>
    </span>
  </div>

  <!-- las 4 secciones se cruzan con fundido (carrete) -->
  <div class="viewport" id="viewport">
    <section class="page active" data-page="0"><div id="convo"></div></section>
    <section class="page" data-page="1"><div id="contactos"></div></section>
    <section class="page" data-page="2"><div id="frases"></div></section>
    <section class="page" data-page="3"><div id="tarjetas"></div></section>
  </div>

  <!-- menú: dónde estás (una palabra) + carrete -->
  <nav class="navbar">
    <div class="dots" id="dots"></div>
    <button class="navword" id="navword" data-action="navnext">hablar</button>
  </nav>

  <div class="turnins" id="turnins" aria-live="polite"></div>

  <script src="events/sonar.js"></script>
  <script src="app.js"></script>
</body>
</html>
